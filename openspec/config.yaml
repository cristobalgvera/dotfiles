# openspec/config.yaml
schema: spec-driven

context: |
  Project: dotfiles — personal macOS dotfiles and bootstrapping
  Stack: Shell/Bash scripts
  Architecture: Script-based config management via symlinks + Homebrew app install
  Testing: No test runner available
  Style: Bash scripts with usage/error handling

rules:
  proposal:
    - Include rollback plan for risky changes
    - Scope changes to a single tool or config domain
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Document architecture decisions with rationale
    - Prefer simple shell patterns over complex abstractions
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
